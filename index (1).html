<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드별 수수료 현황 (탑다운 + 매장 TOP5) | INDONG FN</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f4f2;--sur:#fff;--sur2:#f9f9f8;
  --bd:rgba(0,0,0,.08);--bds:rgba(0,0,0,.16);
  --tx:#111;--txs:#555;--txm:#999;
  --blue:#2a78d6;--green:#1baf7a;--gold:#c97d0a;
  --pink:#d63472;
  --r:10px;
  --font:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);padding:32px 24px 70px;max-width:980px;margin:0 auto;font-size:13px}

.hdr{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:18px;margin-bottom:22px;border-bottom:1.5px solid var(--bds)}
.hdr-l h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.hdr-l p{font-size:11.5px;color:var(--txm);margin-top:5px}
.hdr-badge{font-size:11px;font-weight:700;color:var(--blue);background:#e8f1fc;padding:5px 13px;border-radius:20px;white-space:nowrap}

.note{font-size:11px;color:var(--txs);background:var(--sur2);border:1px solid var(--bd);border-radius:8px;padding:9px 13px;margin-bottom:22px;line-height:1.8}
.note b{color:var(--tx)}

.brand-card{background:var(--sur);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.brand-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none;transition:background .15s}
.brand-head:hover{background:var(--sur2)}
.brand-head .left{display:flex;align-items:center;gap:12px}
.brand-chevron{font-size:13px;color:var(--txm);transition:transform .2s;display:inline-block;width:14px}
.brand-card.open .brand-chevron{transform:rotate(90deg)}
.brand-name{font-size:16px;font-weight:700}
.brand-name.S{color:var(--pink)}.brand-name.L{color:var(--blue)}.brand-name.A{color:var(--gold)}
.brand-meta{font-size:11px;color:var(--txm);margin-left:6px}
.brand-stats{display:flex;gap:18px}
.bstat{text-align:right}
.bstat-lbl{font-size:10px;color:var(--txm)}
.bstat-val{font-size:15px;font-weight:700}
.bstat-val.tot{color:var(--gold)}
.bstat-val.dist{color:var(--blue)}
.bstat-val.mgr{color:var(--green)}

.brand-body{max-height:0;overflow:hidden;transition:max-height .25s ease}
.brand-card.open .brand-body{max-height:20000px}
.brand-body-inner{padding:0 18px 18px}

.dist-row{border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;overflow:hidden}
.dist-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;background:#eef2f8;user-select:none;transition:background .15s}
.dist-head:hover{background:#e4eaf3}
.dist-head .left{display:flex;align-items:center;gap:10px}
.dist-chevron{font-size:11px;color:var(--txs);transition:transform .2s;display:inline-block;width:12px}
.dist-row.open .dist-chevron{transform:rotate(90deg)}
.dist-name{font-size:13.5px;font-weight:700}
.dist-meta{font-size:10.5px;color:var(--txs)}
.dist-stats{display:flex;gap:14px;font-size:11.5px}
.dstat{text-align:right;min-width:38px}
.dstat-lbl{font-size:9.5px;color:var(--txm)}
.dstat-val{font-weight:700}

.dist-body{max-height:0;overflow:hidden;transition:max-height .2s ease}
.dist-row.open .dist-body{max-height:8000px}
.dist-body-inner{padding:6px 0}

.chain-wrap{border-top:1px solid var(--bd)}
.chain-row{display:grid;grid-template-columns:18px 90px 1fr 130px;align-items:center;gap:10px;padding:6px 16px;cursor:pointer;transition:background .12s}
.chain-row:hover{background:var(--sur2)}
.chain-chevron{font-size:9px;color:var(--txm);transition:transform .2s;display:inline-block}
.chain-wrap.open .chain-chevron{transform:rotate(90deg)}
.chain-name{font-size:11.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chain-bars{display:flex;height:14px;border-radius:3px;overflow:hidden;background:#eee}
.bar-margin{background:#2a78d6cc}
.bar-mgr{background:#1baf7acc}
.chain-nums{display:flex;gap:8px;font-size:10.5px;color:var(--txs);justify-content:flex-end;white-space:nowrap}
.chain-tot{font-weight:700;color:var(--gold);min-width:34px;text-align:right}

.store-body{max-height:0;overflow:hidden;transition:max-height .2s ease;background:#fbfbfa}
.chain-wrap.open .store-body{max-height:600px}
.store-body-inner{padding:8px 16px 10px 44px}
.store-title{font-size:10px;color:var(--txm);font-weight:600;margin-bottom:6px;letter-spacing:.2px}
.store-list{display:flex;flex-direction:column;gap:3px}
.store-item{display:grid;grid-template-columns:18px 1fr 60px 56px 56px;align-items:center;gap:8px;font-size:11px;padding:4px 8px;background:#fff;border:1px solid var(--bd);border-radius:6px}
.store-rank{font-size:10px;font-weight:700;color:#fff;background:var(--gold);width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.store-rank.r1{background:#c97d0a}.store-rank.r2{background:#b8901f}.store-rank.r3{background:#a39c33}.store-rank.r4{background:#909747}.store-rank.r5{background:#7d9258}
.store-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.store-code{font-size:9.5px;color:var(--txm)}
.store-margin{text-align:right;font-weight:700;color:var(--blue)}
.store-total{text-align:right;font-weight:700;color:var(--gold)}

.legend{display:flex;gap:14px;margin-bottom:14px;font-size:11px;color:var(--txs)}
.leg{display:flex;align-items:center;gap:5px}
.leg-sq{width:11px;height:11px;border-radius:2px}
</style>
</head>

const BCODE = {'쉬즈미스':'S','리스트':'L','시스티나':'A'};
const BORDER = {'쉬즈미스':'#d63472','리스트':'#2a78d6','시스티나':'#c97d0a'};

function fmtEok(n){ return (n/100000000).toFixed(1)+'억'; }

function render(){
  const root = document.getElementById('brand-list');
  let html = '';
  for(const brand of ['쉬즈미스','리스트','시스티나']){
    const b = DATA[brand];
    const code = BCODE[brand];
    html += renderBrand(brand, b, code);
  }
  root.innerHTML = html;
}

function renderBrand(brand, b, code){
  const distKeys = Object.keys(b['유통구분']).sort((a,c)=> b['유통구분'][c]['합계율'] - b['유통구분'][a]['합계율']);
  let distHtml = '';
  distKeys.forEach((d,i)=>{
    distHtml += renderDist(brand, d, b['유통구분'][d], i);
  });
  return `
  <div class="brand-card" style="border-top:3px solid ${BORDER[brand]}" id="brand-${code}">
    <div class="brand-head" onclick="toggleBrand('${code}')">
      <div class="left">
        <span class="brand-chevron">▶</span>
        <span class="brand-name ${code}">${brand}</span>
        <span class="brand-meta">매장 ${b['총']['매장수']}개 · 매출 ${fmtEok(b['총']['매출'])}</span>

        <div class="bstat"><div class="bstat-lbl">합계</div><div class="bstat-val tot">${b['총']['합계율'].toFixed(1)}%</div></div>
      </div>
    </div>
    <div class="brand-body"><div class="brand-body-inner">
      ${distHtml}
    </div></div>
  </div>`;
}

function renderDist(brand, dist, d, idx){
  const id = brand+'-'+dist;
  let chainHtml = '';
  d['계열'].forEach((c,ci)=>{
    chainHtml += renderChain(brand, dist, c, id+'-'+ci);
  });
  return `
  <div class="dist-row" id="dist-${id}">
    <div class="dist-head" onclick="toggleDist('${id}', event)">
      <div class="left">
        <span class="dist-chevron">▶</span>
        <span class="dist-name">${dist}</span>
        <span class="dist-meta">매장 ${d['매장수']}개 · 매출 ${fmtEok(d['매출'])} · 계열 ${d['계열'].length}개</span>
      </div>
      <div class="dist-stats">
        <div class="dstat"><div class="dstat-lbl">유통</div><div class="dstat-val" style="color:#2a78d6">${d['유통마진율'].toFixed(1)}%</div></div>
        <div class="dstat"><div class="dstat-lbl">매니저</div><div class="dstat-val" style="color:#1baf7a">${d['매니저율'].toFixed(1)}%</div></div>
        <div class="dstat"><div class="dstat-lbl">합계</div><div class="dstat-val" style="color:#c97d0a">${d['합계율'].toFixed(1)}%</div></div>
      </div>
    </div>
    <div class="dist-body"><div class="dist-body-inner">
      ${chainHtml}
    </div></div>
  </div>`;
}

function renderChain(brand, dist, c, cid){
  const maxScale = 70;
  const mw = Math.min(100, c['유통마진율']/maxScale*100);
  const gw = Math.min(100, c['매니저율']/maxScale*100);

  let top5Html = '';
  c['TOP5'].forEach((s,i)=>{
    top5Html += `
    <div class="store-item">
      <span class="store-rank r${i+1}">${i+1}</span>
      <span class="store-name">${s['매장명']}</span>
      <span class="store-code">${s['코드']}</span>
      <span class="store-margin">${s['유통마진율'].toFixed(1)}%</span>
      <span class="store-total">${s['합계율'].toFixed(1)}%</span>
    </div>`;
  });

  return `
  <div class="chain-wrap" id="chain-${cid}">
    <div class="chain-row" onclick="toggleChain('${cid}', event)">
      <span class="chain-chevron">▶</span>
      <div class="chain-name">${c['계열']}</div>
      <div class="chain-bars">
        <div class="bar-margin" style="width:${mw}%"></div>
        <div class="bar-mgr" style="width:${gw}%"></div>
      </div>
      <div class="chain-nums">
        <span>매장${c['매장수']}</span>
        <span>${c['유통마진율'].toFixed(1)}%</span>
        <span>${c['매니저율'].toFixed(1)}%</span>
        <span class="chain-tot">${c['합계율'].toFixed(1)}%</span>
      </div>
    </div>
    <div class="store-body"><div class="store-body-inner">
      <div class="store-title">유통마진율(L열) 상위 5개 매장</div>
      <div class="store-list">${top5Html}</div>
    </div></div>
  </div>`;
}

function toggleBrand(code){
  document.getElementById('brand-'+code).classList.toggle('open');
}
function toggleDist(id, ev){
  ev.stopPropagation();
  document.getElementById('dist-'+id).classList.toggle('open');
}
function toggleChain(cid, ev){
  ev.stopPropagation();
  document.getElementById('chain-'+cid).classList.toggle('open');
}

render();
